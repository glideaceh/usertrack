<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver MBG - Live Location & Distribusi</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome 6 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            background-color: #0f172a;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        #app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            height: 100dvh;
            background-color: #f8fafc;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .view-section {
            display: none;
            height: 100%;
            width: 100%;
            flex-direction: column;
        }

        .view-section.active {
            display: flex;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 10;
        }

        /* 
         * Animasi Pergerakan Marker ala Gojek (Smooth Gliding & Rotation) 
         */
        .custom-car-marker {
            /* Membuat transisi X/Y mulus saat koordinat berubah */
            transition: transform 1.5s linear !important; 
        }
        .custom-car-marker img {
            /* Membuat rotasi (heading) berputar mulus */
            transition: transform 0.8s ease-out; 
            will-change: transform;
            /* Efek shadow pada mobil */
            filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.4)); 
        }

        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10b981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10b981;
        }

        /* Toast Popup */
        #custom-toast {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100px);
            opacity: 0;
        }
        #custom-toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="app-container">

    <!-- ================= HALAMAN LOGIN ================= -->
    <div id="login-view" class="view-section active bg-white text-slate-800">
        <div class="flex-grow flex flex-col justify-center px-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center bg-emerald-100 text-emerald-600 w-20 h-20 rounded-3xl shadow-lg shadow-emerald-500/20 mb-4 transform hover:scale-105 transition border-2 border-emerald-500">
                    <i class="fa-solid fa-truck-fast text-4xl"></i>
                </div>
                <!-- Judul Warna Hijau -->
                <h1 class="text-2xl font-extrabold text-emerald-600">Driver MBG</h1>
                <p class="text-slate-500 text-sm mt-1 font-medium">Aplikasi Distribusi Makan Bergizi Gratis</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">ID Relawan / NIK</label>
                    <div class="relative">
                        <i class="fa-solid fa-id-badge absolute left-4 top-3.5 text-emerald-500"></i>
                        <input type="text" id="loginCourierId" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition" placeholder="Masukkan ID Relawan" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Kata Sandi</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-emerald-500"></i>
                        <input type="password" id="loginCourierPassword" class="w-full pl-11 pr-11 py-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition" placeholder="••••••••" required>
                        <button type="button" onclick="togglePassVisibility('loginCourierPassword', 'eyeIconLogin')" class="absolute right-4 top-3.5 text-slate-400 hover:text-emerald-600 transition">
                            <i id="eyeIconLogin" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-500/30 transition active:scale-[0.98] mt-2">
                    Masuk
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-500 text-sm font-medium">Belum punya akun? 
                    <button type="button" onclick="switchView('register-view')" class="text-emerald-600 font-bold hover:underline">Daftar Sekarang</button>
                </p>
            </div>
        </div>
    </div>

    <!-- ================= HALAMAN REGISTER ================= -->
    <div id="register-view" class="view-section bg-white text-slate-800">
        <div class="flex-grow flex flex-col justify-center px-8 py-6">
            <button type="button" onclick="switchView('login-view')" class="w-10 h-10 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center mb-4 hover:bg-slate-200 transition">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <!-- Judul Warna Hijau -->
            <h1 class="text-2xl font-extrabold text-emerald-600">Pendaftaran Relawan</h1>
            <p class="text-slate-500 text-sm mt-1 mb-6 font-medium">Lengkapi data diri untuk bergabung sebagai relawan</p>

            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">ID Relawan / NIK</label>
                    <input type="text" id="regCourierId" placeholder="Masukkan ID Relawan" class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 focus:outline-none focus:border-emerald-500 transition" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Nama Sesuai KTP</label>
                    <input type="text" id="regCourierName" placeholder="Nama Lengkap" class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 focus:outline-none focus:border-emerald-500 transition" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Nomor Handphone</label>
                    <input type="tel" id="regCourierPhone" placeholder="08xxxxxxxxxx" class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 focus:outline-none focus:border-emerald-500 transition" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Buat Kata Sandi</label>
                    <div class="relative">
                        <input type="password" id="regCourierPassword" placeholder="••••••••" class="w-full pl-4 pr-11 py-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 focus:outline-none focus:border-emerald-500 transition" required>
                        <button type="button" onclick="togglePassVisibility('regCourierPassword', 'eyeIconReg')" class="absolute right-4 top-3.5 text-slate-400 hover:text-emerald-600 transition">
                            <i id="eyeIconReg" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-500/30 transition mt-2">
                    Daftar Sekarang
                </button>
            </form>
        </div>
    </div>

    <!-- ================= HALAMAN DASHBOARD ================= -->
    <div id="dashboard-view" class="view-section relative bg-slate-100 overflow-hidden">
        
        <!-- Header Bar Dashboard -->
        <header class="z-30 bg-white/90 backdrop-blur-md shadow-lg pt-4 pb-3 px-4 rounded-b-2xl absolute top-0 w-full left-0 border-b border-slate-100">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center space-x-3">
                    <div class="relative">
                        <img id="driverAvatar" src="https://ui-avatars.com/api/?name=Relawan&background=10b981&color=fff" alt="Profile" class="w-11 h-11 rounded-full border-2 border-emerald-500 shadow-md">
                        <span id="badgeOnlineStatus" class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-slate-400 border-2 border-white rounded-full"></span>
                    </div>
                    <div>
                        <h2 id="displayDriverName" class="font-bold text-slate-800 text-sm leading-tight">Memuat...</h2>
                        <div id="statusText" class="flex items-center text-xs font-semibold text-slate-500 mt-0.5">
                            <i class="fa-solid fa-circle text-[8px] mr-1 text-slate-400"></i> Istirahat (Offline)
                        </div>
                    </div>
                </div>
                
                <!-- Toggle Online/Offline -->
                <div class="flex items-center bg-slate-100 p-1.5 rounded-full border border-slate-200">
                    <span class="text-xs font-bold mr-2 ml-2 text-slate-600" id="switchLabel">OFF</span>
                    <div class="relative inline-block w-12 h-6 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" id="status-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-slate-300 appearance-none cursor-pointer z-10 transition-all duration-300"/>
                        <label for="status-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                </div>
            </div>
            
            <!-- Operational Stats MBG -->
            <div class="grid grid-cols-3 gap-2 bg-emerald-50/80 rounded-xl p-2.5 border border-emerald-100 text-center">
                <div>
                    <p class="text-[10px] uppercase font-bold text-emerald-800/70">Target Antar</p>
                    <p class="font-extrabold text-slate-800 text-xs mt-0.5">45 Pax</p>
                </div>
                <div class="border-x border-emerald-200/60 px-1">
                    <p class="text-[10px] uppercase font-bold text-emerald-800/70">Selesai</p>
                    <p class="font-extrabold text-emerald-600 text-xs mt-0.5">0 Pax</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-emerald-800/70">Sisa</p>
                    <p class="font-extrabold text-rose-500 text-xs mt-0.5">45 Pax</p>
                </div>
            </div>

            <!-- Status Live GPS -->
            <div class="mt-2.5 flex items-center justify-between text-[11px] bg-slate-800 text-slate-200 px-3 py-1.5 rounded-lg shadow-inner">
                <div class="flex items-center space-x-1.5">
                    <i class="fa-solid fa-satellite-dish text-emerald-400 animate-pulse"></i>
                    <span>GPS: <strong id="gpsStatusText" class="text-slate-400">Belum Aktif</strong></span>
                </div>
                <div class="text-[10px] text-slate-400">
                    <span id="latLngDisplay">Lat: - | Lng: -</span>
                </div>
            </div>
        </header>

        <!-- Peta Leaflet -->
        <div id="map"></div>

        <!-- Tombol Recenter -->
        <button id="recenter-btn" title="Pusatkan ke lokasi saya" class="z-20 absolute bottom-20 right-4 bg-white text-emerald-600 w-12 h-12 p-3 rounded-2xl shadow-xl flex items-center justify-center hover:bg-emerald-50 active:scale-95 transition border border-slate-100 focus:outline-none">
            <i class="fa-solid fa-crosshairs text-xl"></i>
        </button>

        <!-- Bottom Navigation Bar -->
        <nav class="z-30 absolute bottom-0 left-0 w-full bg-white border-t border-slate-200 flex justify-around items-center pt-2 pb-3 px-2 shadow-[0_-8px_20px_rgba(0,0,0,0.06)]">
            <button class="flex flex-col items-center p-1 text-emerald-600 w-1/4">
                <i class="fa-solid fa-house text-lg mb-0.5"></i>
                <span class="text-[10px] font-bold">Beranda</span>
            </button>
            <button class="flex flex-col items-center p-1 text-slate-400 hover:text-emerald-600 transition w-1/4">
                <i class="fa-solid fa-clipboard-list text-lg mb-0.5"></i>
                <span class="text-[10px] font-bold">Tugas</span>
            </button>
            <button class="flex flex-col items-center p-1 text-slate-400 hover:text-emerald-600 transition w-1/4">
                <i class="fa-solid fa-comments text-lg mb-0.5"></i>
                <span class="text-[10px] font-bold">Pesan</span>
            </button>
            <button onclick="logout()" class="flex flex-col items-center p-1 text-slate-400 hover:text-rose-500 transition w-1/4">
                <i class="fa-solid fa-right-from-bracket text-lg mb-0.5"></i>
                <span class="text-[10px] font-bold">Keluar</span>
            </button>
        </nav>
    </div>

    <!-- Notification Toast Popup -->
    <div id="custom-toast" class="z-50 absolute bottom-20 left-4 right-4 bg-slate-900/95 text-white p-3.5 rounded-2xl shadow-2xl flex items-center space-x-3 border border-slate-700">
        <i id="toastIcon" class="fa-solid fa-circle-info text-emerald-400 text-xl"></i>
        <div class="text-xs flex-grow" id="toastMessage">Pesan Notifikasi...</div>
    </div>

</div>

<!-- Leaflet Library JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase SDK Module Integration -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref as rtdbRef, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyBgwpEPTeg_9_rd7iRgo7qXIfbmOgMhHyo",
        authDomain: "tracking-kurir.firebaseapp.com",
        databaseURL: "https://tracking-kurir-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tracking-kurir",
        storageBucket: "tracking-kurir.firebasestorage.app",
        messagingSenderId: "665988290840",
        appId: "1:665988290840:web:ba878fd0daf99c1042e66d"
    };

    // Inisialisasi Firebase Apps
    const app = initializeApp(firebaseConfig);
    const rtdb = getDatabase(app);
    const dbFS = getFirestore(app);

    // Global State Variables
    let currentUser = null;
    let map = null;
    let driverMarker = null;
    let watchId = null;
    let isOnline = false;
    let mapInitialized = false;
    let currentHeading = 0; // Sudut arah hadap mobil

    // Posisi awal peta (Default Indonesia)
    let driverLat = -2.5489;
    let driverLng = 118.0149;

    // Helper timeout untuk permintaan jaringan
    const withTimeout = (promise, ms = 5000) => {
        let timeoutId;
        const timeoutPromise = new Promise((_, reject) => {
            timeoutId = setTimeout(() => reject(new Error('Koneksi habis waktu (Timeout)')), ms);
        });
        return Promise.race([promise, timeoutPromise]).finally(() => clearTimeout(timeoutId));
    };

    // Helper Toast Notification
    window.showToast = function(message, iconClass = "fa-circle-info text-emerald-400") {
        const toast = document.getElementById('custom-toast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');

        toastMessage.innerText = message;
        toastIcon.className = `fa-solid ${iconClass} text-xl`;
        
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3500);
    };

    // Helper Password Visiblity Toggle
    window.togglePassVisibility = function(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.className = "fa-solid fa-eye-slash";
        } else {
            input.type = "password";
            icon.className = "fa-solid fa-eye";
        }
    };

    // Switch View Navigation
    window.switchView = function(viewId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');

        if (viewId === 'dashboard-view' && !mapInitialized) {
            setTimeout(() => initMap(), 300);
        }
    };

    // ==========================================
    // CEK AUTO LOGIN (LOCAL STORAGE)
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
        const savedSession = localStorage.getItem("mbg_driver_session");
        if (savedSession) {
            currentUser = JSON.parse(savedSession);
            document.getElementById('displayDriverName').innerText = currentUser.nama;
            document.getElementById('driverAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.nama)}&background=10b981&color=fff`;
            switchView('dashboard-view');
            showToast(`Selamat datang kembali, ${currentUser.nama}!`, "fa-circle-check text-emerald-400");
        }
    });

    // ==========================================
    // SISTEM AUTENTIKASI (FIRESTORE)
    // ==========================================

    // Submit Pendaftaran
    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const id = document.getElementById('regCourierId').value.trim();
        const name = document.getElementById('regCourierName').value.trim();
        const phone = document.getElementById('regCourierPhone').value.trim();
        const pass = document.getElementById('regCourierPassword').value;

        showToast("Memproses pendaftaran...", "fa-spinner fa-spin text-blue-400");

        try {
            const userRef = doc(dbFS, "mbg_relawan", id);
            const docSnap = await withTimeout(getDoc(userRef));

            if (docSnap.exists()) {
                return showToast("ID Relawan sudah terdaftar! Gunakan ID lain.", "fa-circle-xmark text-rose-400");
            }

            await withTimeout(setDoc(userRef, {
                id: id,
                nama: name,
                no_hp: phone,
                password: pass,
                role: "relawan",
                bergabung: new Date().toISOString()
            }));

            // Simpan sesi auto-login (LocalStorage)
            currentUser = { id: id, nama: name, no_hp: phone };
            localStorage.setItem("mbg_driver_session", JSON.stringify(currentUser));

            document.getElementById('displayDriverName').innerText = currentUser.nama;
            document.getElementById('driverAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.nama)}&background=10b981&color=fff`;

            showToast("Pendaftaran berhasil!", "fa-circle-check text-emerald-400");
            switchView('dashboard-view');

        } catch (error) {
            console.error("Register Error:", error);
            showToast("Gagal mendaftar: " + error.message, "fa-triangle-exclamation text-rose-400");
        }
    });

    // Submit Login
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const id = document.getElementById('loginCourierId').value.trim();
        const pass = document.getElementById('loginCourierPassword').value;

        showToast("Memeriksa akun...", "fa-spinner fa-spin text-blue-400");

        try {
            const userRef = doc(dbFS, "mbg_relawan", id);
            const docSnap = await withTimeout(getDoc(userRef));

            if (!docSnap.exists()) {
                return showToast("ID Relawan tidak ditemukan!", "fa-circle-xmark text-rose-400");
            }

            const userData = docSnap.data();

            if (userData.password !== pass) {
                return showToast("Kata sandi salah!", "fa-circle-xmark text-rose-400");
            }

            // Simpan sesi auto-login (LocalStorage)
            currentUser = { id: id, nama: userData.nama, no_hp: userData.no_hp || "" };
            localStorage.setItem("mbg_driver_session", JSON.stringify(currentUser));

            document.getElementById('displayDriverName').innerText = currentUser.nama;
            document.getElementById('driverAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.nama)}&background=10b981&color=fff`;

            switchView('dashboard-view');
            showToast(`Selamat bertugas, ${currentUser.nama}!`, "fa-circle-check text-emerald-400");

        } catch (error) {
            console.error("Login Error:", error);
            showToast("Gagal masuk: " + error.message, "fa-triangle-exclamation text-rose-400");
        }
    });

    // Logout
    window.logout = function() {
        if (isOnline) {
            document.getElementById('status-toggle').click(); // Matikan tracking
        }
        currentUser = null;
        localStorage.removeItem("mbg_driver_session"); // Hapus sesi
        
        // Reset form login
        document.getElementById('loginCourierId').value = "";
        document.getElementById('loginCourierPassword').value = "";
        
        switchView('login-view');
        showToast("Anda telah keluar.");
    };

    // ==========================================
    // MAP & LIVE GPS LOCATION TRACKING (RTDB)
    // ==========================================

    // Mengkalkulasi derajat arah(bearing) antar 2 titik kordinat agar mobil menghadap ke arah jalan
    function calculateBearing(startLat, startLng, destLat, destLng) {
        const toRad = (degree) => degree * Math.PI / 180;
        const toDeg = (rad) => rad * 180 / Math.PI;

        const phi1 = toRad(startLat);
        const phi2 = toRad(destLat);
        const deltaLambda = toRad(destLng - startLng);

        const y = Math.sin(deltaLambda) * Math.cos(phi2);
        const x = Math.cos(phi1) * Math.sin(phi2) -
                  Math.sin(phi1) * Math.cos(phi2) * Math.cos(deltaLambda);

        let brng = toDeg(Math.atan2(y, x));
        return (brng + 360) % 360;
    }

    function initMap() {
        if (mapInitialized) return;

        map = L.map('map', { zoomControl: false }).setView([driverLat, driverLng], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap & CartoDB',
            maxZoom: 19
        }).addTo(map);

        // Ikon Mobil Custom CDN
        const carImageUrl = "https://cdn-icons-png.flaticon.com/128/12689/12689302.png";

        const customDriverIcon = L.divIcon({
            className: 'custom-car-marker',
            html: `<img src="${carImageUrl}" id="car-icon-img" style="width: 44px; height: 44px; transform: rotate(0deg);">`,
            iconSize: [44, 44],
            iconAnchor: [22, 22] // Ditengah agar rotasi rapih
        });

        driverMarker = L.marker([driverLat, driverLng], { icon: customDriverIcon }).addTo(map);
        driverMarker.setOpacity(0); 
        mapInitialized = true;
    }

    function updateMapMarker(lat, lng, headingFromGPS) {
        // Kalkulasi sudut putar (Bearing) hanya jika berpindah jarak lumayan agar stabil
        if (driverLat !== -2.5489 && (Math.abs(driverLat - lat) > 0.00001 || Math.abs(driverLng - lng) > 0.00001)) {
            // Gunakan heading asli dari GPS jika ada, jika tidak kalkulasi manual
            if (headingFromGPS && !isNaN(headingFromGPS)) {
                currentHeading = headingFromGPS;
            } else {
                currentHeading = calculateBearing(driverLat, driverLng, lat, lng);
            }
        }

        driverLat = lat;
        driverLng = lng;

        if (driverMarker) {
            driverMarker.setOpacity(1);
            driverMarker.setLatLng([lat, lng]); // Ini akan meluncur mulus karena CSS transition transform
            
            // Putar gambar mobil
            const carImg = document.getElementById('car-icon-img');
            if (carImg) {
                carImg.style.transform = `rotate(${currentHeading}deg)`;
            }
        }
        
        document.getElementById('latLngDisplay').innerText = `Lat: ${lat.toFixed(4)} | Lng: ${lng.toFixed(4)}`;
    }

    // Toggle Switch Pekerjaan
    const statusToggle = document.getElementById('status-toggle');
    const statusText = document.getElementById('statusText');
    const switchLabel = document.getElementById('switchLabel');
    const badgeStatus = document.getElementById('badgeOnlineStatus');
    const gpsStatusText = document.getElementById('gpsStatusText');

    statusToggle.addEventListener('change', function() {
        if (this.checked) {
            isOnline = true;
            statusText.innerHTML = '<i class="fa-solid fa-circle text-[8px] mr-1 text-emerald-500 animate-pulse"></i> Mengantar (Online)';
            statusText.className = "flex items-center text-xs font-bold text-emerald-600 mt-0.5";
            switchLabel.innerText = "ON";
            switchLabel.className = "text-xs font-bold mr-2 ml-2 text-emerald-600";
            badgeStatus.className = "absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-500 border-2 border-white rounded-full animate-pulse";
            gpsStatusText.innerText = "Mencari Sinyal...";
            gpsStatusText.className = "text-amber-400 font-bold";

            startGpsTracking();
            showToast("Status MENGANTAR. GPS Aktif!");
        } else {
            isOnline = false;
            statusText.innerHTML = '<i class="fa-solid fa-circle text-[8px] mr-1 text-slate-400"></i> Istirahat (Offline)';
            statusText.className = "flex items-center text-xs font-semibold text-slate-500 mt-0.5";
            switchLabel.innerText = "OFF";
            switchLabel.className = "text-xs font-bold mr-2 ml-2 text-slate-600";
            badgeStatus.className = "absolute bottom-0 right-0 w-3.5 h-3.5 bg-slate-400 border-2 border-white rounded-full";
            gpsStatusText.innerText = "Belum Aktif";
            gpsStatusText.className = "text-slate-400 font-bold";

            stopGpsTracking();
            showToast("Status ISTIRAHAT.", "fa-circle-pause text-amber-400");
        }
    });

    // Mulai Pelacakan GPS Real-time ke Firebase RTDB
    function startGpsTracking() {
        if (!navigator.geolocation) {
            showToast("Perangkat tidak mendukung Geolocation", "fa-triangle-exclamation text-rose-400");
            statusToggle.checked = false;
            return;
        }

        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const heading = pos.coords.heading; // Bisa null jika device tidak support compass

                updateMapMarker(lat, lng, heading);

                if (gpsStatusText.innerText === "Mencari Sinyal...") {
                    map.setView([lat, lng], 17);
                }

                gpsStatusText.innerText = `Akurat (${pos.coords.accuracy.toFixed(0)}m)`;
                gpsStatusText.className = "text-emerald-400 font-bold";

                // Kirim Posisi ke Realtime Database
                if (currentUser) {
                    const trackRef = rtdbRef(rtdb, `tracking_mbg/${currentUser.id}`);
                    update(trackRef, {
                        nama: currentUser.nama,
                        location: { lat: lat, lng: lng },
                        heading: currentHeading,
                        status: "mengantar",
                        last_updated: new Date().toISOString()
                    });
                }
            },
            (err) => {
                gpsStatusText.innerText = `Sinyal Lemah (${err.message})`;
                gpsStatusText.className = "text-amber-400 font-bold";
            },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }

    // Hentikan Pelacakan GPS
    function stopGpsTracking() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }

        if (driverMarker) {
            driverMarker.setOpacity(0);
        }

        // Update Status Offline ke RTDB
        if (currentUser) {
            const trackRef = rtdbRef(rtdb, `tracking_mbg/${currentUser.id}`);
            update(trackRef, { 
                status: "offline",
                last_updated: new Date().toISOString()
            });
        }
    }

    // Tombol Pusatkan Peta
    document.getElementById('recenter-btn').addEventListener('click', function() {
        if (driverMarker && driverMarker.options.opacity !== 0) {
            map.flyTo([driverLat, driverLng], 17, { animate: true, duration: 1.0 });
            showToast("Peta dipusatkan ke posisi Anda!");
        } else {
            showToast("Aktifkan status (ON) untuk melihat lokasi GPS.", "fa-triangle-exclamation text-amber-400");
        }
    });

</script>
</body>
</html>
